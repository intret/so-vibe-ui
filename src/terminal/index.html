<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Vibe Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="xterm.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0F172A; }
    #vibe-app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #terminal-wrapper {
      flex: 1 1 0;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }
    #terminal-container {
      width: 100%;
      height: 100%;
    }
    #terminal-container .xterm {
      padding: 10px;
      height: 100%;
    }

    /* ── Scrollbar ─────────────────────────────────────── */
    /* Firefox: thin by default */
    .xterm-viewport {
      scrollbar-width: thin;
      scrollbar-color: #334155 transparent;
    }

    /* WebKit: thin idle, wide on hover/active */
    .xterm-viewport::-webkit-scrollbar {
      width: 6px;
      height: 6px;
      transition: width 0.2s ease;
    }
    .xterm-viewport::-webkit-scrollbar-track {
      background: transparent;
    }
    .xterm-viewport::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 3px;
      min-height: 40px;
      transition: background 0.15s ease;
    }
    .xterm-viewport::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    /* Expand scrollbar on viewport hover / scroll */
    .xterm-viewport:hover::-webkit-scrollbar,
    .xterm-viewport:active::-webkit-scrollbar,
    .xterm-viewport.scrolling::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }
    .xterm-viewport:hover::-webkit-scrollbar-thumb,
    .xterm-viewport:active::-webkit-scrollbar-thumb,
    .xterm-viewport.scrolling::-webkit-scrollbar-thumb {
      background: #22C55E;
      border-radius: 6px;
    }

    /* ── Toolbar ──────────────────────────────────────── */
    #vibe-toolbar {
      position: relative;
      flex-shrink: 0;
      background: #1E293B;
      border-top: 1px solid #334155;
      padding: 8px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: max-height 0.25s ease, padding 0.25s ease, opacity 0.25s ease;
      max-height: 200px;
      opacity: 1;
      overflow: hidden;
    }
    #vibe-toolbar.vibe-toolbar-collapsed {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      opacity: 0;
      border-top-color: transparent;
    }

    .vibe-toolbar-toggle {
      position: absolute;
      top: -28px;
      right: 10px;
      width: 32px;
      height: 24px;
      border: 1px solid #334155;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      background: #1E293B;
      color: #94A3B8;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s ease, background 0.15s ease;
    }
    .vibe-toolbar-toggle:hover {
      color: #22C55E;
      background: #0F172A;
    }

    .vibe-toolbar-row {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .vibe-toolbar-btn {
      min-width: 44px;
      height: 38px;
      padding: 0 10px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0F172A;
      color: #E2E8F0;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s ease, border-color 0.1s ease, color 0.1s ease;
    }
    .vibe-toolbar-btn:active {
      background: #22C55E;
      border-color: #22C55E;
      color: #0F172A;
    }
    .vibe-toolbar-btn--mod {
      color: #94A3B8;
      font-size: 12px;
      letter-spacing: 0.04em;
    }
    .vibe-toolbar-btn--active {
      background: #22C55E !important;
      border-color: #22C55E !important;
      color: #0F172A !important;
    }
    .vibe-toolbar-btn--enter {
      color: #22C55E;
      border-color: #22C55E55;
    }
    .vibe-toolbar-btn--wide {
      min-width: 64px;
    }

    /* ── Desktop: hide toggle tab, show toolbar only if needed ── */
    @media (min-width: 769px) {
      .vibe-toolbar-toggle {
        display: none;
      }
      #vibe-toolbar {
        max-height: 40px;
        padding: 4px 10px;
        flex-direction: row;
        justify-content: center;
        gap: 8px;
      }
      #vibe-toolbar .vibe-toolbar-row {
        flex: none;
        gap: 6px;
      }
      .vibe-toolbar-btn {
        min-width: 36px;
        height: 30px;
        font-size: 12px;
        border-radius: 6px;
        padding: 0 8px;
      }
    }
  </style>
</head>
<body>
  <div id="vibe-app">
    <div id="terminal-wrapper">
      <div id="terminal-container"></div>
    </div>
  </div>
  <script src="terminal.js"></script>
</body>
</html>
